<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>traineo — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#F1EFE8;min-height:100vh}
    .app{max-width:390px;margin:0 auto;min-height:100vh;background:#F8F7F4;padding-bottom:3rem}
    .nav{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem}
    .nav-logo{font-size:1.2rem;font-weight:400;color:#111110;letter-spacing:-.3px}
    .nav-neo{color:#163A28}
    .nav-avatar{width:34px;height:34px;border-radius:50%;background:#163A28;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:500;cursor:pointer}
    .greeting{padding:0 1.25rem 1rem}
    .greeting-sub{font-size:.75rem;color:#888780;margin-bottom:2px}
    .greeting-name{font-size:1.3rem;font-weight:500;color:#111110;letter-spacing:-.3px}
    .today{margin:0 1.25rem 1rem;background:#163A28;border-radius:18px;padding:1.25rem;cursor:pointer}
    .today-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
    .today-label{font-size:.7rem;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.1em}
    .today-badge{background:rgba(255,255,255,.12);color:#fff;font-size:.7rem;padding:.2rem .6rem;border-radius:20px}
    .today-title{font-size:1.6rem;font-weight:500;color:#fff;letter-spacing:-.4px;margin-bottom:.75rem}
    .today-bullets{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem}
    .today-bullet{font-size:.82rem;color:rgba(255,255,255,.65);line-height:1.4}
    .today-actions{display:grid;grid-template-columns:1fr 1fr;gap:.5rem}
    .btn-white{background:#fff;color:#163A28;border:none;border-radius:8px;padding:.7rem;font-size:.85rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer}
    .btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:none;border-radius:8px;padding:.7rem;font-size:.85rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer}
    .week-section{margin:0 1.25rem 1rem}
    .week-section.next-week{opacity:.85}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
    .section-title{font-size:.9rem;font-weight:500;color:#111110}
    .section-title.next{color:#888780}
    .plan-list{display:flex;flex-direction:column;gap:6px}
    .plan-item{background:#fff;border:.5px solid #E8E6DF;border-radius:12px;padding:.85rem 1rem;display:flex;align-items:center;gap:.75rem;transition:all .15s;cursor:pointer}
    .plan-item.today-item{border:1.5px solid #163A28;background:#F1FAF5}
    .plan-item.rest-item{background:#F1EFE8;border-color:#F1EFE8;cursor:default}
    .plan-item.completed{opacity:.7;border-color:#4A9E6B;background:#F1FAF5}
    .plan-item.partial{opacity:.75;border-color:#F0C84A;background:#FEF6E5}
    .plan-item.skipped{opacity:.55;border-color:#E04040;background:#FFEAEA}
    .plan-item.completed .plan-item-title,.plan-item.partial .plan-item-title,.plan-item.skipped .plan-item-title{text-decoration:line-through;color:#888780}
    .plan-item.changed{border:1.5px solid #4A9E6B;background:#F1FAF5}
    .plan-day-badge{width:28px;height:28px;border-radius:8px;background:#F1EFE8;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:#888780;flex-shrink:0}
    .plan-item.today-item .plan-day-badge{background:#163A28;color:#fff}
    .plan-item-icon{font-size:1.1rem;flex-shrink:0}
    .plan-item-info{flex:1;min-width:0}
    .plan-item-title{font-size:.9rem;font-weight:500;color:#111110;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-item.today-item .plan-item-title{color:#163A28}
    .plan-item.rest-item .plan-item-title{color:#888780;font-weight:400}
    .plan-item-sub{font-size:.75rem;color:#888780;margin-top:1px}
    .plan-item-actions{display:flex;gap:4px;flex-shrink:0}
    .action-btn{width:28px;height:28px;border-radius:7px;border:.5px solid #E8E6DF;background:#fff;cursor:pointer;font-size:.8rem;display:flex;align-items:center;justify-content:center}
    .action-btn.done{background:#4A9E6B;border-color:#4A9E6B;color:#fff}
    .stats-card{margin:0 1.25rem 1rem;background:#fff;border:.5px solid #E8E6DF;border-radius:12px;padding:1rem}
    .stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:.75rem}
    .stat{text-align:center}
    .stat-val{font-size:1.1rem;font-weight:500;color:#111110}
    .stat-val.green{color:#163A28}
    .stat-lbl{font-size:.65rem;color:#888780;margin-top:2px}
    .btn-reorganize{width:100%;background:#163A28;color:#fff;border:none;border-radius:8px;padding:.65rem;font-size:.85rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer}
    .race-card{margin:0 1.25rem 1rem;background:#111110;border-radius:14px;padding:1rem 1.25rem;display:flex;align-items:center;gap:.75rem}
    .race-icon{font-size:1.5rem;flex-shrink:0}
    .race-title{font-size:.9rem;font-weight:500;color:#fff;margin-bottom:2px}
    .race-sub{font-size:.75rem;color:rgba(255,255,255,.45)}
    .race-days{font-size:1.2rem;font-weight:500;color:#4A9E6B;margin-left:auto}
    .race-days-lbl{font-size:.65rem;color:rgba(255,255,255,.4);text-align:right}

    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-overlay.blocking{align-items:center}
    .modal{background:#F8F7F4;border-radius:20px 20px 0 0;padding:1.5rem 1.25rem 2rem;width:100%;max-width:390px;max-height:85vh;overflow-y:auto}
    .modal-overlay.blocking .modal{border-radius:20px;margin:1rem}
    .modal-handle{width:36px;height:4px;border-radius:2px;background:#D3D1C7;margin:0 auto 1.25rem}
    .modal-title{font-size:1.1rem;font-weight:500;color:#111110;margin-bottom:.25rem}
    .modal-sub{font-size:.85rem;color:#888780;margin-bottom:1.25rem}
    .btn-green{width:100%;background:#163A28;color:#fff;border:none;border-radius:10px;padding:.9rem;font-size:.95rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;margin-bottom:.5rem}
    .btn-green:disabled{opacity:.4;cursor:not-allowed}
    .btn-cancel{width:100%;background:none;border:none;color:#888780;font-size:.85rem;font-family:'Outfit',sans-serif;cursor:pointer;padding:.5rem}

    .catchup-row{background:#fff;border:.5px solid #E8E6DF;border-radius:12px;padding:1rem;margin-bottom:.75rem}
    .catchup-day-title{font-size:.95rem;font-weight:500;color:#111110;margin-bottom:.5rem}
    .catchup-day-sub{font-size:.75rem;color:#888780;margin-bottom:.85rem}
    .catchup-status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;margin-bottom:.6rem}
    .cu-st{padding:.6rem .3rem;border:.5px solid #E8E6DF;border-radius:8px;background:#fff;font-size:.78rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;color:#555}
    .cu-st.sel{border:1.5px solid #163A28;background:#F1FAF5;color:#163A28}
    .catchup-rpe-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem}
    .cu-rpe{padding:.5rem .2rem;border:.5px solid #E8E6DF;border-radius:8px;background:#fff;font-size:.7rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer;color:#888780}
    .cu-rpe.sel{border:1.5px solid #163A28;background:#F1FAF5;color:#163A28}

    .no-plan{margin:2rem 1.25rem;background:#fff;border:.5px solid #E8E6DF;border-radius:16px;padding:1.5rem;text-align:center}
    .no-plan-icon{font-size:2rem;margin-bottom:.75rem}
    .no-plan-title{font-size:1rem;font-weight:500;color:#111110;margin-bottom:.5rem}
    .no-plan-sub{font-size:.85rem;color:#888780;margin-bottom:1rem;line-height:1.5}
    .btn-start{background:#163A28;color:#fff;border:none;border-radius:10px;padding:.75rem 1.5rem;font-size:.9rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer}

    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#111110;color:#fff;font-size:.85rem;padding:.65rem 1.25rem;border-radius:20px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.show{opacity:1}
    .loading-overlay{position:fixed;inset:0;background:rgba(248,247,244,.95);z-index:150;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
    .loading-overlay.show{display:flex}
    .spinner{width:40px;height:40px;border:3px solid #E8E6DF;border-top-color:#163A28;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-size:.9rem;color:#888780;text-align:center}
    .reajust-banner{margin:0 1.25rem 1rem;background:#EBF5EF;border:.5px solid #4A9E6B;border-radius:12px;padding:.75rem 1rem;display:none;align-items:center;gap:.75rem}
    .reajust-banner.show{display:flex}
    .reajust-text{font-size:.82rem;color:#163A28;line-height:1.4}
  </style>
</head>
<body>
<div class="app">
  <div class="nav">
    <div style="display:flex;align-items:center;gap:8px">
      <svg width="28" height="28" viewBox="0 0 56 56" fill="none">
        <rect width="56" height="56" rx="14" fill="#163A28"/>
        <rect x="8" y="11" width="32" height="7" rx="2" fill="white" transform="skewX(-12)"/>
        <rect x="21" y="11" width="9" height="28" rx="2" fill="white" transform="skewX(-12)"/>
        <circle cx="32" cy="43" r="3.5" fill="white"/>
      </svg>
      <span class="nav-logo">trai<span class="nav-neo">neo</span></span>
    </div>
    <div class="nav-avatar" id="nav-avatar">T</div>
  </div>
  <div class="greeting">
    <div class="greeting-sub" id="greeting-date">Hoy</div>
    <div class="greeting-name" id="greeting-name">Hola! 👋</div>
  </div>
  <div id="reajust-banner" class="reajust-banner"><div class="reajust-text" id="reajust-text"></div></div>
  <div id="main-content"></div>
</div>

<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Cargando...</div>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL CATCH-UP (blocking) -->
<div class="modal-overlay blocking" id="modal-catchup">
  <div class="modal">
    <div class="modal-title">¿Cómo fue tu semana?</div>
    <div class="modal-sub">Confirma qué hiciste para que el coach pueda adaptar la próxima semana.</div>
    <div id="catchup-rows"></div>
    <button class="btn-green" id="catchup-submit" onclick="submitCatchup()" disabled>Confirmar →</button>
  </div>
</div>

<script>
const dayNames=['Lu','Ma','Mi','Ju','Vi','Sá','Do'];
const months=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

// ─── Date helpers ────────────────────────────────────────────
function getMondayISO(date){
  const d=new Date(date);
  const day=d.getDay();
  const diff=day===0?-6:1-day;
  d.setDate(d.getDate()+diff);
  d.setHours(0,0,0,0);
  return d.toISOString().split('T')[0];
}
function addDaysISO(iso,days){
  const d=new Date(iso);
  d.setDate(d.getDate()+days);
  return d.toISOString().split('T')[0];
}
function todayDayIdx(){return (new Date().getDay()+6)%7;}

// ─── URL params + user ───────────────────────────────────────
const today=new Date();
const todayName=dayNames[todayDayIdx()];
document.getElementById('greeting-date').textContent=todayName+' · '+today.getDate()+' '+months[today.getMonth()];

const params=new URLSearchParams(window.location.search);
const sportsParam=params.get('sports');
const emailParam=params.get('email');

let user=sportsParam?{
  sports:sportsParam.split(','),
  dias:parseInt(params.get('dias'))||3,
  descanso:decodeURIComponent(params.get('descanso')||'Ninguno'),
  nivel:decodeURIComponent(params.get('nivel')||'Intermedio'),
  fcmax:parseInt(params.get('fcmax'))||185,
  volum:parseInt(params.get('volum'))||4,
  objetivo:decodeURIComponent(params.get('objetivo')||''),
  carrera:decodeURIComponent(params.get('carrera')||''),
  distancia:decodeURIComponent(params.get('distancia')||''),
  desnivel:parseInt(params.get('desnivel'))||0,
  fecha:decodeURIComponent(params.get('fecha')||''),
  email:emailParam||''
}:null;

let currentEmail=emailParam||'';
let currentWeek=null;
let nextWeek=null;
let allWeeks=[];
let catchupState={};  // { idx: { status, rpe } }

// ─── Bootstrap ───────────────────────────────────────────────
async function bootstrap(){
  // Si tenim email però no sports, recupera el perfil
  if(!user && emailParam){
    try {
      const res=await fetch('/api/get-plan?email='+encodeURIComponent(emailParam));
      const data=await res.json();
      if(data.profile){
        user={...data.plan.userData,email:emailParam};
        currentEmail=emailParam;
      }
    } catch(e){ console.error('Bootstrap failed:',e); }
  }
  if(user){
    await initDashboard(user);
  } else {
    document.getElementById('main-content').innerHTML='<div class="no-plan"><div class="no-plan-icon">🏃</div><div class="no-plan-title">Aún no tienes un plan</div><div class="no-plan-sub">Cuéntame tus objetivos y crearé tu plan personalizado.</div><button class="btn-start" onclick="window.location.href=\'index.html\'">Empezar →</button></div>';
  }
}

async function initDashboard(user){
  if(currentEmail){
    document.getElementById('nav-avatar').textContent=currentEmail[0].toUpperCase();
    document.getElementById('greeting-name').textContent='Hola, '+currentEmail.split('@')[0]+' 👋';
  }

  showLoading('Cargando tu plan...');

  const currentMonday=getMondayISO(new Date());
  const nextMonday=addDaysISO(currentMonday,7);

  // Carrega totes les setmanes de l'usuari
  if(currentEmail){
    try {
      const res=await fetch('/api/get-plan?email='+encodeURIComponent(currentEmail));
      const data=await res.json();
      allWeeks=data.weeks||[];
    } catch(e){ console.error('Load weeks failed:',e); }
  }

  // Setmana actual: busca o genera
  let curr=allWeeks.find(w=>w.setmana===currentMonday);
  if(!curr){
    showLoading('Tu coach está preparando esta semana...');
    const latestPrev=allWeeks.find(w=>w.setmana<currentMonday);
    curr=await generateAndSaveWeek(user,currentMonday,latestPrev);
  }
  currentWeek=curr;

  // Setmana propera: busca o genera amb current com a previousWeek
  let next=allWeeks.find(w=>w.setmana===nextMonday);
  if(!next){
    showLoading('Preparando la próxima semana...');
    next=await generateAndSaveWeek(user,nextMonday,currentWeek);
  }
  nextWeek=next;

  hideLoading();

  // Check catch-up: dies passats d'aquesta setmana sense confirmar
  const unconfirmed=findUnconfirmedPastDays(currentWeek);
  if(unconfirmed.length>0){
    showCatchupModal(unconfirmed);
    return;
  }

  renderAll();
}

// ─── Week generation ─────────────────────────────────────────
async function generateAndSaveWeek(user,weekStartDate,previousWeek){
  try {
    const body={
      sports:user.sports,dias:user.dias,descanso:user.descanso,
      nivel:user.nivel,fcmax:user.fcmax,volum:user.volum,
      objetivo:user.objetivo,carrera:user.carrera,
      distancia:user.distancia,desnivel:user.desnivel,fecha:user.fecha
    };
    if(previousWeek){
      body.previousWeek={
        setmana:previousWeek.setmana,
        sessions:previousWeek.sessions,
        resum:previousWeek.resum,
        phase:previousWeek.phase
      };
    }
    const res=await fetch('/api/coach',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    const data=await res.json();
    const sessions=normalizePlan(data.setmana||[]);
    const resum=data.resum||'';

    if(currentEmail){
      await fetch('/api/save-plan',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          email:currentEmail,userData:user,
          sessions:sessions,resum:resum,
          weekStartDate:weekStartDate
        })
      });
    }
    return { setmana:weekStartDate, sessions, resum };
  } catch(error){
    console.error('Generate week error:',error);
    return { setmana:weekStartDate, sessions:buildStaticSessions(user), resum:'' };
  }
}

function buildStaticSessions(user){
  const fallbacks={running:'Rodaje Z2',ciclismo:'Rodada Z2',gimnasio:'Fuerza',natacion:'Técnica',calistenia:'Calistenia',trail:'Trail Z2'};
  const sports=user.sports||['running'];
  let idx=0;
  return dayNames.map(d=>{
    if(d===user.descanso) return {day:d,rest:true,icon:'💤',title:'Descanso',duracio_min:0};
    if(idx<user.dias){
      const sport=sports[idx%sports.length];
      idx++;
      return {day:d,rest:false,icon:'🏃',title:fallbacks[sport]||'Sesión',duracio_min:45,tags:[sport,'Z2']};
    }
    return {day:d,rest:true,icon:'💤',title:'Descanso',duracio_min:0};
  });
}

function normalizePlan(sessions){
  return sessions.map((d,i)=>({
    ...d,
    day:d.day||d.dia||dayNames[i]||dayNames[0],
    title:d.title||d.titulo||'Sesión',
    sub:d.sub||d.description||'',
    why:d.why||'',
    tags:d.tags||[],
    icon:d.icon||'🏃',
    rest:d.rest||d.title==='Descanso'||false,
    duracio_min:d.duracio_min||d.duracion||45,
    canviat:d.canviat||false,
    completed:d.completed||false,
    skipped:d.skipped||false,
    completion:d.completion||null
  }));
}

// ─── Catch-up modal ──────────────────────────────────────────
function findUnconfirmedPastDays(week){
  if(!week||!week.sessions) return [];
  const tIdx=todayDayIdx();
  const out=[];
  week.sessions.forEach((s,idx)=>{
    if(idx>=tIdx) return;
    if(s.rest) return;
    if(s.completed||s.skipped) return;
    out.push({idx,day:s.day,session:s});
  });
  return out;
}

function showCatchupModal(unconfirmed){
  catchupState={};
  const dayMap={Lu:'Lunes',Ma:'Martes',Mi:'Miércoles',Ju:'Jueves',Vi:'Viernes','Sá':'Sábado',Do:'Domingo'};
  const rowsHTML=unconfirmed.map(u=>{
    const s=u.session;
    return '<div class="catchup-row" data-idx="'+u.idx+'">'+
      '<div class="catchup-day-title">'+dayMap[u.day]+' · '+s.title+'</div>'+
      '<div class="catchup-day-sub">'+(s.duracio_min||45)+' min'+(s.sub?' · '+s.sub:'')+'</div>'+
      '<div class="catchup-status-grid">'+
        '<button class="cu-st" onclick="setCatchupStatus('+u.idx+',\'completed\',this)">✓ Sí</button>'+
        '<button class="cu-st" onclick="setCatchupStatus('+u.idx+',\'partial\',this)">~ A medias</button>'+
        '<button class="cu-st" onclick="setCatchupStatus('+u.idx+',\'skipped\',this)">✗ No</button>'+
      '</div>'+
      '<div class="catchup-rpe-grid" id="rpe-'+u.idx+'" style="display:none">'+
        '<button class="cu-rpe" onclick="setCatchupRPE('+u.idx+',\'easy\',this)">😎 Fácil</button>'+
        '<button class="cu-rpe" onclick="setCatchupRPE('+u.idx+',\'good\',this)">😊 Bien</button>'+
        '<button class="cu-rpe" onclick="setCatchupRPE('+u.idx+',\'hard\',this)">😓 Duro</button>'+
        '<button class="cu-rpe" onclick="setCatchupRPE('+u.idx+',\'very_hard\',this)">😵 Límite</button>'+
      '</div>'+
    '</div>';
  }).join('');
  document.getElementById('catchup-rows').innerHTML=rowsHTML;
  document.getElementById('catchup-submit').disabled=true;
  document.getElementById('modal-catchup').classList.add('open');
}

function setCatchupStatus(idx,status,el){
  const row=el.closest('.catchup-row');
  row.querySelectorAll('.cu-st').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  if(!catchupState[idx]) catchupState[idx]={};
  catchupState[idx].status=status;
  const rpeBlock=document.getElementById('rpe-'+idx);
  if(status==='skipped'){
    rpeBlock.style.display='none';
    delete catchupState[idx].rpe;
  } else {
    rpeBlock.style.display='grid';
  }
  checkCatchupReady();
}

function setCatchupRPE(idx,rpe,el){
  const row=el.closest('.catchup-row');
  row.querySelectorAll('.cu-rpe').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  if(!catchupState[idx]) catchupState[idx]={};
  catchupState[idx].rpe=rpe;
  checkCatchupReady();
}

function checkCatchupReady(){
  const rows=document.querySelectorAll('.catchup-row');
  let ready=true;
  rows.forEach(r=>{
    const idx=parseInt(r.dataset.idx);
    const st=catchupState[idx];
    if(!st||!st.status) ready=false;
    else if(st.status!=='skipped'&&!st.rpe) ready=false;
  });
  document.getElementById('catchup-submit').disabled=!ready;
}

async function submitCatchup(){
  // Aplica completion a cada sessió
  let hasFailures=false;
  Object.keys(catchupState).forEach(key=>{
    const idx=parseInt(key);
    const st=catchupState[idx];
    const s=currentWeek.sessions[idx];
    s.completed=(st.status==='completed'||st.status==='partial');
    s.skipped=(st.status==='skipped');
    s.completion={
      status:st.status,
      rpe:st.rpe||null,
      plannedDuration:s.duracio_min||45,
      actualDuration:st.status==='completed'?(s.duracio_min||45):(st.status==='partial'?Math.round((s.duracio_min||45)*0.6):0),
      date:new Date().toISOString()
    };
    if(st.status!=='completed') hasFailures=true;
  });

  document.getElementById('modal-catchup').classList.remove('open');
  await saveCurrentWeek();

  // Si hi ha hagut faltes, reorganitza els dies restants
  if(hasFailures){
    const fallidos=Object.entries(catchupState).filter(([k,v])=>v.status!=='completed').map(([k,v])=>{
      const s=currentWeek.sessions[parseInt(k)];
      return s.day+' ('+s.title+': '+v.status+')';
    }).join(', ');
    showReajustBanner('Reorganizando la semana en función de lo que has hecho...');
    await reajustarPla(`Sessions no completades aquesta setmana: ${fallidos}. Reorganitza els dies de ${todayName} a Do per redistribuir o suavitzar segons sigui necessari. Respecta dies marcats com completed o skipped (immutables).`);
  }

  renderAll();
}

async function saveCurrentWeek(){
  if(!currentEmail||!currentWeek) return;
  try {
    await fetch('/api/save-plan',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email:currentEmail,userData:user,
        sessions:currentWeek.sessions,
        resum:currentWeek.resum||'',
        weekStartDate:currentWeek.setmana
      })
    });
  } catch(e){ console.error('Save current week failed:',e); }
}

async function saveNextWeek(){
  if(!currentEmail||!nextWeek) return;
  try {
    await fetch('/api/save-plan',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        email:currentEmail,userData:user,
        sessions:nextWeek.sessions,
        resum:nextWeek.resum||'',
        weekStartDate:nextWeek.setmana
      })
    });
  } catch(e){ console.error('Save next week failed:',e); }
}

// ─── Reajust ─────────────────────────────────────────────────
async function reajustarPla(canvi,loadingMsg='Reajustando...'){
  showLoading(loadingMsg);
  try {
    const res=await fetch('/api/reajust',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({planActual:currentWeek.sessions,canvi:canvi,userData:user})
    });
    const data=await res.json();
    if(data.setmana){
      currentWeek.sessions=normalizePlan(data.setmana);
      if(data.resum) currentWeek.resum=data.resum;
      if(data.missatge) showReajustBanner(data.missatge);
      await saveCurrentWeek();
    }
  } catch(e){ console.error('Reajust failed:',e); }
  finally { hideLoading(); renderAll(); }
}

// ─── Render ──────────────────────────────────────────────────
function renderAll(){
  if(!currentWeek) return;
  const sessions=currentWeek.sessions;
  const todayRealIdx=sessions.findIndex(d=>d.day===todayName);
  const todaySession=todayRealIdx>=0?sessions[todayRealIdx]:(sessions.find(d=>!d.rest)||sessions[0]||{title:'Descanso',icon:'💤',duracio_min:0});
  const trainDays=sessions.filter(d=>!d.rest);
  const totalMin=trainDays.reduce((a,d)=>a+(d.duracio_min||45),0);
  const h=Math.floor(totalMin/60),m=totalMin%60;
  const fc=user?.fcmax||185;
  const z2min=Math.round(fc*.60),z2max=Math.round(fc*.70);

  let raceHTML='';
  if(user?.carrera&&user?.fecha){
    const diff=Math.ceil((new Date(user.fecha)-new Date())/(1000*60*60*24));
    if(diff>0){
      raceHTML='<div class="race-card"><div class="race-icon">🏁</div><div><div class="race-title">'+user.carrera+'</div><div class="race-sub">'+user.distancia+'</div></div><div style="text-align:right;margin-left:auto"><div class="race-days">'+diff+'</div><div class="race-days-lbl">días</div></div></div>';
    }
  }

  document.getElementById('main-content').innerHTML=
    raceHTML+
    renderTodayCard(todaySession,todayRealIdx)+
    '<div class="week-section"><div class="section-head"><span class="section-title">Esta semana</span></div><div class="plan-list">'+
      sessions.map((d,i)=>renderPlanItem(d,i,false)).join('')+
    '</div></div>'+
    (nextWeek?
      '<div class="week-section next-week"><div class="section-head"><span class="section-title next">Próxima semana</span></div><div class="plan-list">'+
        nextWeek.sessions.map((d,i)=>renderPlanItem(d,i,true)).join('')+
      '</div></div>':'')+
    '<div class="stats-card"><div class="stats-grid">'+
      '<div class="stat"><div class="stat-val">'+h+'h'+(m>0?' '+m+'m':'')+'</div><div class="stat-lbl">Carga</div></div>'+
      '<div class="stat"><div class="stat-val green">'+trainDays.length+'</div><div class="stat-lbl">Sesiones</div></div>'+
      '<div class="stat"><div class="stat-val">'+z2min+'-'+z2max+'</div><div class="stat-lbl">Z2 bpm</div></div>'+
    '</div><button class="btn-reorganize" onclick="window.location.href=\'onboarding.html?email='+encodeURIComponent(currentEmail)+'\'">↺ Reconfigurar</button></div>';
}

function renderTodayCard(s,idx){
  const dur=s.duracio_min||45;
  const zona=(s.tags||[]).find(t=>t.startsWith('Z'))||'Z2';
  return '<div class="today" onclick="openSessio('+idx+')">'+
    '<div class="today-meta"><span class="today-label">Hoy · '+todayName+'</span><span class="today-badge">Esta semana</span></div>'+
    '<div class="today-title">'+s.title+'</div>'+
    '<div class="today-bullets">'+
      '<div class="today-bullet">⏱ '+dur+' min · '+zona+'</div>'+
      (s.sub?'<div class="today-bullet">📍 '+s.sub+'</div>':'')+
      (s.why?'<div class="today-bullet">💬 '+s.why+'</div>':'')+
    '</div>'+
    '<div class="today-actions" onclick="event.stopPropagation()">'+
      '<button class="btn-white" onclick="markCompleted('+idx+')">✓ Marcar hecho</button>'+
      '<button class="btn-ghost" onclick="openSessio('+idx+')">▶ Empezar</button>'+
    '</div></div>';
}

function renderPlanItem(d,i,isNext){
  const isToday=!isNext&&d.day===todayName;
  let cls='';
  if(d.completed&&d.completion?.status==='completed') cls='completed';
  else if(d.completion?.status==='partial') cls='partial';
  else if(d.skipped) cls='skipped';
  else if(isToday) cls='today-item';
  else if(d.rest) cls='rest-item';
  else if(d.canviat) cls='changed';

  return '<div class="plan-item '+cls+'" onclick="'+(isNext?'':'openSessio('+i+')')+'">'+
    '<div class="plan-day-badge">'+d.day+'</div>'+
    '<span class="plan-item-icon">'+(d.icon||'🏃')+'</span>'+
    '<div class="plan-item-info">'+
      '<div class="plan-item-title">'+(d.title||'Sesión')+'</div>'+
      (d.sub?'<div class="plan-item-sub">'+d.sub+'</div>':'')+
    '</div>'+
  '</div>';
}

// ─── Marcar completed des de la card d'avui ──────────────────
async function markCompleted(idx){
  const s=currentWeek.sessions[idx];
  if(!s||s.rest) return;
  s.completed=true;
  s.completion={status:'completed',rpe:'good',plannedDuration:s.duracio_min||45,actualDuration:s.duracio_min||45,date:new Date().toISOString()};
  await saveCurrentWeek();
  showToast('Sesión completada ✓');
  renderAll();
}

// ─── Sessio detall ───────────────────────────────────────────
function openSessio(idx){
  if(idx<0||!currentWeek) return;
  const d=currentWeek.sessions[idx];
  if(!d||d.rest) return;
  const p=new URLSearchParams({
    title:d.title||'',sub:d.sub||'',why:d.why||'',
    tags:(d.tags||[]).join(','),icon:d.icon||'🏃',
    fcmax:user?.fcmax||185,nivel:user?.nivel||'Intermedio',
    duracio:d.duracio_min||45,idx:idx
  });
  window.location.href='sessio.html?'+p.toString();
}

// ─── UI helpers ──────────────────────────────────────────────
function showLoading(msg){
  document.getElementById('loading-text').textContent=msg||'Cargando...';
  document.getElementById('loading-overlay').classList.add('show');
}
function hideLoading(){document.getElementById('loading-overlay').classList.remove('show');}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function showReajustBanner(msg){
  document.getElementById('reajust-text').textContent=msg;
  document.getElementById('reajust-banner').classList.add('show');
  setTimeout(()=>document.getElementById('reajust-banner').classList.remove('show'),5000);
}

bootstrap();
</script>
