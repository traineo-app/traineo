<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>traineo — Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;background:#F1EFE8;min-height:100vh}
    .app{max-width:390px;margin:0 auto;min-height:100vh;background:#F8F7F4;padding-bottom:6rem}
    .hero{background:#163A28;padding:1rem 1.25rem 1.75rem}
    .nav{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem}
    .btn-back{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .nav-logo{font-size:1rem;font-weight:400;color:rgba(255,255,255,.5)}
    .nav-neo{color:rgba(255,255,255,.25)}
    .hero-icon{font-size:2.2rem;margin-bottom:.5rem}
    .hero-title{font-size:1.75rem;font-weight:500;color:#fff;letter-spacing:-.4px;margin-bottom:.5rem}
    .hero-bullets{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem}
    .hero-bullet{font-size:.85rem;color:rgba(255,255,255,.7);display:flex;align-items:flex-start;gap:.5rem;line-height:1.5}
    .hero-bullet-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.4);flex-shrink:0;margin-top:.45rem}
    .body{padding:1.25rem}
    .section{margin-bottom:1.5rem}
    .section-title{font-size:.72rem;font-weight:600;color:#888780;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.75rem}
    .zones-row{display:flex;gap:5px;margin-bottom:.5rem}
    .zone{flex:1;border-radius:8px;padding:7px 3px;text-align:center;opacity:.35}
    .zone.active{opacity:1;transform:scale(1.05)}
    .zone-label{font-size:.7rem;font-weight:600;color:#fff}
    .zone-range{font-size:.62rem;color:rgba(255,255,255,.85);margin-top:2px}
    .zone-target{font-size:.8rem;color:#111110;margin-top:.4rem}
    .blocks{display:flex;flex-direction:column;gap:6px}
    .block{background:#fff;border:.5px solid #E8E6DF;border-radius:10px;padding:.875rem 1rem;display:flex;align-items:center;gap:.75rem}
    .block-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
    .block-info{flex:1}
    .block-title{font-size:.95rem;font-weight:500;color:#111110;margin-bottom:3px}
    .block-sub{font-size:.8rem;color:#888780}
    .block-time{font-size:.9rem;font-weight:600;color:#163A28;flex-shrink:0}
    .exercises{display:flex;flex-direction:column;gap:8px}
    .exercise{background:#fff;border:.5px solid #E8E6DF;border-radius:12px;padding:1rem;display:flex;align-items:center;gap:1rem}
    .ex-num{width:36px;height:36px;border-radius:8px;background:#F1FAF5;border:1.5px solid #163A28;color:#163A28;display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:600;flex-shrink:0}
    .ex-info{flex:1}
    .ex-name{font-size:.95rem;font-weight:500;color:#111110;margin-bottom:4px}
    .ex-detail{font-size:.82rem;color:#888780;margin-bottom:5px;line-height:1.4}
    .ex-muscle{font-size:.72rem;font-weight:500;padding:2px 8px;border-radius:20px;background:#E8F4ED;color:#163A28;display:inline-block}
    .tip{background:#EBF5EF;border-radius:10px;padding:.875rem 1rem;display:flex;gap:.75rem;align-items:flex-start}
    .tip-dot{width:6px;height:6px;border-radius:50%;background:#163A28;margin-top:5px;flex-shrink:0}
    .tip-text{font-size:.85rem;color:#163A28;line-height:1.6}
    .export-card{background:#111110;border-radius:12px;padding:1rem;display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:8px}
    .export-info .export-title{font-size:.9rem;font-weight:500;color:#fff;margin-bottom:2px}
    .export-info .export-sub{font-size:.75rem;color:rgba(255,255,255,.4)}
    .btn-export{background:#163A28;border:none;color:#fff;font-size:.8rem;font-weight:500;font-family:'Outfit',sans-serif;padding:.6rem 1rem;border-radius:8px;cursor:pointer;white-space:nowrap}
    .bottom-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:#F8F7F4;border-top:.5px solid #E8E6DF;padding:.875rem 1.25rem;display:flex;gap:.75rem;z-index:50}
    .btn-empezar{flex:1;background:#163A28;color:#fff;border:none;border-radius:12px;padding:.9rem;font-size:1rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer}
    .btn-ver{background:#fff;border:.5px solid #E8E6DF;color:#163A28;border-radius:12px;padding:.9rem 1rem;font-size:.85rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer}
    .guided{display:none;position:fixed;inset:0;background:#163A28;z-index:200;flex-direction:column;align-items:center;justify-content:space-between;padding:2rem 1.5rem;max-width:390px;margin:0 auto}
    .guided.open{display:flex}
    .guided-header{width:100%;display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem}
    .guided-step-info{font-size:.8rem;color:rgba(255,255,255,.5)}
    .btn-close{background:rgba(255,255,255,.1);border:none;color:#fff;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:.9rem;font-family:'Outfit',sans-serif}
    .guided-dots{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;max-width:240px}
    .gdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .2s}
    .gdot.done{background:rgba(255,255,255,.5)}
    .gdot.active{background:#fff;transform:scale(1.4)}
    .gdot.rest{background:rgba(255,255,255,.15)}
    .guided-body{display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;justify-content:center;gap:.6rem;width:100%}
    .guided-type{font-size:.7rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.12em}
    .guided-serie-counter{font-size:5rem;font-weight:200;color:#fff;letter-spacing:-3px;line-height:1;font-variant-numeric:tabular-nums}
    .guided-serie-unit{font-size:1.1rem;color:rgba(255,255,255,.5);margin-top:-.5rem}
    .guided-name{font-size:1.5rem;font-weight:500;color:#fff;letter-spacing:-.3px;line-height:1.2}
    .guided-detail{font-size:.9rem;color:rgba(255,255,255,.55);line-height:1.5}
    .guided-zone-badge{background:rgba(255,255,255,.12);border-radius:20px;padding:.3rem .9rem;font-size:.82rem;color:#fff;font-weight:500}
    .guided-timer{font-size:3.5rem;font-weight:300;color:#fff;letter-spacing:-2px;font-variant-numeric:tabular-nums}
    .guided-timer-lbl{font-size:.75rem;color:rgba(255,255,255,.35)}
    .guided-muscle{font-size:.8rem;color:rgba(255,255,255,.35)}
    .guided-ex-num{width:72px;height:72px;border-radius:16px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:500;color:#fff}
    .guided-progress{width:100%;height:4px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden}
    .guided-progress-fill{height:100%;background:#fff;border-radius:2px;transition:width .5s linear}
    .guided-actions{display:flex;gap:.75rem;width:100%}
    .btn-guided-prev{flex:1;background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:12px;padding:.875rem;font-size:.9rem;font-weight:500;font-family:'Outfit',sans-serif;cursor:pointer}
    .btn-guided-next{flex:2;background:#fff;border:none;color:#163A28;border-radius:12px;padding:.875rem;font-size:.95rem;font-weight:600;font-family:'Outfit',sans-serif;cursor:pointer}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div class="nav">
      <button class="btn-back" onclick="history.back()">←</button>
      <span class="nav-logo">trai<span class="nav-neo">neo</span></span>
    </div>
    <div class="hero-icon" id="h-icon">🏃</div>
    <div class="hero-title" id="h-title">Sesión</div>
    <div class="hero-bullets" id="h-bullets"></div>
  </div>
  <div class="body">
    <div id="zones-sec"></div>
    <div id="structure-sec"></div>
    <div id="exercises-sec"></div>
    <div id="tip-sec"></div>
    <div id="export-sec"></div>
  </div>
</div>

<div class="bottom-bar">
  <button class="btn-ver" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Ver todo</button>
  <button class="btn-empezar" onclick="startGuided()">▶ Empezar</button>
</div>

<div class="guided" id="guided">
  <div class="guided-header">
    <div class="guided-step-info" id="g-step-info">Paso 1</div>
    <div class="guided-dots" id="g-dots"></div>
    <button class="btn-close" onclick="closeGuided()">✕</button>
  </div>
  <div class="guided-body" id="g-body"></div>
  <div style="width:100%;display:flex;flex-direction:column;gap:.75rem">
    <div class="guided-progress"><div class="guided-progress-fill" id="g-progress" style="width:0%"></div></div>
    <div class="guided-actions">
      <button class="btn-guided-prev" id="g-prev" onclick="prevStep()">← Atrás</button>
      <button class="btn-guided-next" id="g-next" onclick="nextStep()">Siguiente →</button>
    </div>
  </div>
</div>

<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

var params=new URLSearchParams(window.location.search);
var title='Sesión';try{title=decodeURIComponent(params.get('title')||'Sesión');}catch(e){}
var sub='';try{sub=decodeURIComponent(params.get('sub')||'');}catch(e){}
var why='';try{why=decodeURIComponent(params.get('why')||'');}catch(e){}
var icon='🏃';try{icon=decodeURIComponent(params.get('icon')||'🏃');}catch(e){}
var fcmax=parseInt(params.get('fcmax'))||185;
var duracio=parseInt(params.get('duracio'))||45;
var tl=title.toLowerCase();

// DETECTA TIPUS
var gymWords=['tren inferior','tren superior','full body','calistenia','core y movilidad','lower body','upper body'];
var cardioWords=['rodaje','trail','bici','ciclismo','natación','nado','piscina','brick','ruta','rodada','series','running'];
var isGym=gymWords.some(function(k){return tl.includes(k);})||(!cardioWords.some(function(k){return tl.includes(k);})&&(tl.includes('fuerza')||tl.includes('gimnas')||tl.includes('gym')));
var isCardio=!isGym;
var isCycling=tl.includes('bici')||tl.includes('cicl')||tl.includes('rodada');
var isSwim=tl.includes('piscina')||tl.includes('natación')||tl.includes('nado');

// ZONES
var zones=[
  {label:'Z1',color:'#60B8F0',min:Math.round(fcmax*.50),max:Math.round(fcmax*.60)},
  {label:'Z2',color:'#4EA84A',min:Math.round(fcmax*.60),max:Math.round(fcmax*.70)},
  {label:'Z3',color:'#F0C84A',min:Math.round(fcmax*.70),max:Math.round(fcmax*.80)},
  {label:'Z4',color:'#F08C30',min:Math.round(fcmax*.80),max:Math.round(fcmax*.90)},
  {label:'Z5',color:'#E04040',min:Math.round(fcmax*.90),max:fcmax}
];

var colorToZone={'#60B8F0':0,'#4EA84A':1,'#F0C84A':2,'#F08C30':3,'#E04040':4,'#888780':-1};

function getMainZone(){
  if(tl.includes('recupera')) return 0;
  if(tl.includes('z2')||tl.includes('aeróbico')||tl.includes('largo')||tl.includes('suave')||tl.includes('fondo')) return 1;
  if(tl.includes('z3')||tl.includes('umbral')||tl.includes('tempo')||tl.includes('sweetspot')) return 2;
  if(tl.includes('series')||tl.includes('z4')||tl.includes('cuesta')||tl.includes('intervalo')||tl.includes('velocidad')) return 3;
  if(tl.includes('z5')) return 4;
  if(tl.includes('trail')) return 1;
  return 1;
}
var mainZone=getMainZone();

// ESTRUCTURES
function getStruct(){
  var d=duracio;
  if(tl.includes('trail')){return [{title:'Calentamiento',sub:'Trote Z1 en llano',dur:10,color:'#60B8F0'},{title:'Bloque principal',sub:sub||'Por esfuerzo · caminar subidas fuertes',dur:d-15,color:'#4EA84A'},{title:'Vuelta a la calma',sub:'Trote suave',dur:5,color:'#60B8F0'}];}
  if(tl.includes('recupera')){return [{title:'Trote Z1',sub:'Muy suave · nunca forzar',dur:d,color:'#60B8F0'}];}
  if(tl.includes('brick')){return [{title:'Bici Z2-Z3',sub:'Ritmo medio-alto',dur:Math.round(d*.65),color:'#F0C84A'},{title:'Transición',sub:'Cambio rápido de zapatillas',dur:2,color:'#888780'},{title:'Running Z3',sub:'Aguanta con piernas cargadas',dur:Math.round(d*.33),color:'#F08C30'}];}
  if(tl.includes('cuesta')){return [{title:'Calentamiento',sub:'15 min Z1-Z2',dur:15,color:'#60B8F0'},{title:'8-10 × 45" cuesta arriba',sub:'A Z4 · bajar trotando 60 seg',dur:25,color:'#F08C30'},{title:'Vuelta a la calma',sub:'10 min llano suave',dur:10,color:'#60B8F0'}];}
  if(tl.includes('series')&&(tl.includes('bici')||tl.includes('cicl'))){return [{title:'Calentamiento',sub:'15 min cadencia alta Z2',dur:15,color:'#60B8F0'},{title:'4 × 8 min sweetspot',sub:'88-93% FTP · 4 min recuperación',dur:25,color:'#F08C30'},{title:'Vuelta a la calma',sub:'10 min Z1',dur:10,color:'#60B8F0'}];}
  if(tl.includes('series')&&isSwim){return [{title:'Calentamiento',sub:'200m suave',dur:10,color:'#60B8F0'},{title:'8 × 100m a Z3-Z4',sub:'20 seg pausa entre series',dur:25,color:'#F08C30'},{title:'Vuelta a la calma',sub:'200m suave',dur:5,color:'#60B8F0'}];}
  if(tl.includes('series')||tl.includes('intervalo')||tl.includes('velocidad')){return [{title:'Calentamiento',sub:'15 min trote + 4 strides',dur:15,color:'#60B8F0'},{title:'6 × 400m a Z4',sub:'90 seg recuperación entre series',dur:20,color:'#F08C30'},{title:'Vuelta a la calma',sub:'10 min trote suave',dur:10,color:'#60B8F0'}];}
  if(tl.includes('largo')||tl.includes('fondo')){return [{title:'Calentamiento',sub:'Z1 muy suave',dur:10,color:'#60B8F0'},{title:'Fondo Z2',sub:'Ritmo cómodo · hablar sin problemas',dur:d-15,color:'#4EA84A'},{title:'Vuelta a la calma',sub:'Andar + estirar',dur:5,color:'#60B8F0'}];}
  if(tl.includes('ruta')){return [{title:'Salida suave Z1',sub:'Primeros 20 min tranquilo',dur:20,color:'#60B8F0'},{title:'Fondo Z2',sub:'Ritmo sostenible',dur:d-30,color:'#4EA84A'},{title:'Vuelta a casa',sub:'Reducir intensidad',dur:10,color:'#60B8F0'}];}
  if(isSwim){return [{title:'Calentamiento',sub:'200m suave',dur:10,color:'#60B8F0'},{title:'Drills técnicos',sub:'Catch-up · one arm · rotació',dur:15,color:'#4EA84A'},{title:'Series técnica',sub:'6 × 50m · foco en brazada',dur:20,color:'#F0C84A'},{title:'Vuelta a la calma',sub:'100m suave',dur:5,color:'#60B8F0'}];}
  if(isCycling){return [{title:'Calentamiento',sub:'Cadencia alta, potencia baja',dur:10,color:'#60B8F0'},{title:'Z2 en bici',sub:'Cadencia 90+ rpm · '+Math.round(fcmax*.62)+'-'+Math.round(fcmax*.70)+' bpm',dur:d-15,color:'#4EA84A'},{title:'Vuelta a la calma',sub:'Reducir potencia',dur:5,color:'#60B8F0'}];}
  // Default: rodaje
  return [{title:'Calentamiento',sub:'Trote suave Z1',dur:10,color:'#60B8F0'},{title:'Bloque principal',sub:sub||('Ritmo conversacional · '+Math.round(fcmax*.63)+'-'+Math.round(fcmax*.70)+' bpm'),dur:d-15,color:'#4EA84A'},{title:'Vuelta a la calma',sub:'Trote suave + estirar',dur:5,color:'#60B8F0'}];
}

function getGym(){
  if(tl.includes('inferior')||tl.includes('lower')||tl.includes('pierna')||tl.includes('leg')){
    return [{name:'Sentadilla',detail:'4 × 8 reps · 75-80% RM · 2 min descanso',muscle:'Cuádriceps · Glúteos'},{name:'Romanian Deadlift',detail:'3 × 10 reps · controla la bajada 3 seg',muscle:'Isquios · Glúteos'},{name:'Sentadilla búlgara',detail:'3 × 8 reps cada pierna',muscle:'Cuádriceps · Glúteos'},{name:'Hip thrust',detail:'4 × 12 reps · aprieta el glúteo arriba',muscle:'Glúteos'},{name:'Step-up',detail:'3 × 10 reps cada pierna',muscle:'Cuádriceps · Glúteos'},{name:'Elevación de talones',detail:'3 × 15 reps · lento y controlado',muscle:'Gemelos · Sóleo'}];
  }
  if(tl.includes('superior')||tl.includes('upper')||tl.includes('pecho')||tl.includes('espalda')){
    return [{name:'Press de banca',detail:'4 × 8-10 reps',muscle:'Pectoral · Tríceps'},{name:'Remo con mancuerna',detail:'3 × 10 reps cada brazo',muscle:'Espalda · Bíceps'},{name:'Press militar',detail:'3 × 8 reps · core activado',muscle:'Hombros · Tríceps'},{name:'Dominadas',detail:'3 × máx o 5 negativas lentas',muscle:'Espalda · Bíceps'},{name:'Curl de bíceps',detail:'3 × 12 reps',muscle:'Bíceps'},{name:'Dips',detail:'3 × máx reps controladas',muscle:'Tríceps · Pectoral'}];
  }
  if(tl.includes('calistenia')){
    return [{name:'Flexiones',detail:'4 × máx reps controladas',muscle:'Pectoral · Tríceps'},{name:'Dominadas',detail:'4 × máx o 5 negativas',muscle:'Espalda · Bíceps'},{name:'Dips',detail:'3 × máx reps',muscle:'Tríceps · Pectoral'},{name:'Sentadilla búlgara',detail:'3 × 8 reps cada pierna',muscle:'Cuádriceps · Glúteos'},{name:'Plancha',detail:'3 × 1 min',muscle:'Core'},{name:'Bird dog',detail:'3 × 10 reps cada lado',muscle:'Core · Lumbares'}];
  }
  if(tl.includes('core')||tl.includes('movilidad')){
    return [{name:'Plancha frontal',detail:'3 × 45-60 seg',muscle:'Core · Transverso'},{name:'Bird dog',detail:'3 × 10 reps cada lado',muscle:'Core · Lumbares'},{name:'Dead bug',detail:'3 × 8 reps · espalda pegada',muscle:'Core · Transverso'},{name:'Hip thrust',detail:'2 × 15 reps · movilidad cadera',muscle:'Cadera · Glúteos'},{name:'Sentadilla búlgara',detail:'2 × 8 reps movilidad',muscle:'Cadera · Flexores'},{name:'Elevación de talones',detail:'2 × 12 reps lento',muscle:'Gemelos · Tobillo'}];
  }
  return [{name:'Sentadilla',detail:'3 × 12 reps dinámicas',muscle:'Piernas · Glúteos'},{name:'Flexiones',detail:'3 × 10-15 reps',muscle:'Pectoral · Tríceps'},{name:'Dominadas',detail:'3 × 8 reps o máximo',muscle:'Espalda · Bíceps'},{name:'Plancha',detail:'3 × 45 segundos',muscle:'Core'},{name:'Bird dog',detail:'3 × 10 reps cada lado · lento',muscle:'Core · Lumbares'},{name:'Dead bug',detail:'3 × 8 reps · espalda pegada',muscle:'Core · Transverso'}];
}

// PARSEIG DE SERIES
function parseSeries(blockTitle, blockSub){
  var m=blockTitle.match(/(\d+)(?:-\d+)?\s*[×x×]\s*(\d+\.?\d*)\s*(m\b|km\b|min\b)?/i);
  if(!m) return null;
  var reps=parseInt(m[1]);
  var amount=parseFloat(m[2]);
  var unit=(m[3]||'').toLowerCase();
  var distMeters=null,timeSecs=null;
  if(unit==='m') distMeters=Math.round(amount);
  else if(unit==='km') distMeters=Math.round(amount*1000);
  else if(unit==='min') timeSecs=Math.round(amount*60);
  else distMeters=Math.round(amount);
  var restSecs=60;
  var rm=(blockSub||'').match(/(\d+)\s*(seg|min|s\b)/i);
  if(rm){var ra=parseInt(rm[1]);restSecs=rm[2].toLowerCase().startsWith('min')?ra*60:ra;}
  return {reps:reps,distMeters:distMeters,timeSecs:timeSecs,restSecs:restSecs};
}

var struct=isCardio?getStruct():null;
var exList=isGym?getGym():null;

// TIPS
function getTip(){
  var tipMap={trail:'En trail el Z2 es por esfuerzo, no por ritmo. Caminar las subidas no es rendirse — es ser listo.',rodaje:'Si puedes mantener una conversación sin problemas, vas bien. Si no puedes hablar, baja el ritmo.',largo:'Ve siempre más despacio de lo que crees. Bebe cada 20 minutos aunque no tengas sed.',recupera:'Ve lento de verdad. Este entreno activa la circulación y elimina el lactato.',bici:'Mantén cadencia por encima de 85-90 rpm. Cadencia baja fatiga más las piernas.',series:'La recuperación es tan importante como el esfuerzo. Mejor 6 series buenas que 10 malas.',inferior:'Controla la bajada contando 3 segundos. La rodilla no pasa el pie. Core activado siempre.',superior:'El remo es tan importante como el press. Equilibra empuje y tracción.',calistenia:'Las negativas en dominadas son el mejor ejercicio para aprender.',core:'Bird dog y dead bug previenen lesiones de espalda.',brick:'Las primeras transiciones son raras — las piernas pesan el doble. Con el tiempo el cuerpo se adapta.',natación:'En natación la técnica vale el doble que el esfuerzo.',piscina:'En natación la técnica vale el doble que el esfuerzo.'};
  for(var k in tipMap){if(tl.includes(k)) return tipMap[k];}
  return why||'Cada sesión cuenta. Consistencia > intensidad.';
}

// RENDERITZA HERO
document.getElementById('h-icon').textContent=icon;
document.getElementById('h-title').textContent=title;
var bulletsHTML='';
if(sub) bulletsHTML+='<div class="hero-bullet"><div class="hero-bullet-dot"></div><span>⏱ '+esc(sub)+'</span></div>';
if(why) bulletsHTML+='<div class="hero-bullet"><div class="hero-bullet-dot"></div><span>'+esc(why)+'</span></div>';
document.getElementById('h-bullets').innerHTML=bulletsHTML;

// ZONES
if(isCardio){
  try{
    var zh='<div class="section"><div class="section-title">Zonas de frecuencia cardíaca</div><div class="zones-row">';
    zones.forEach(function(z,i){zh+='<div class="zone'+(i===mainZone?' active':'')+'" style="background:'+z.color+'"><div class="zone-label">'+z.label+'</div><div class="zone-range">'+z.min+'-'+z.max+'</div></div>';});
    zh+='</div><div class="zone-target">Zona objetivo: <strong>'+zones[mainZone].label+' · '+zones[mainZone].min+'-'+zones[mainZone].max+' bpm</strong></div></div>';
    document.getElementById('zones-sec').innerHTML=zh;
  }catch(e){}
}

// TCX GENERATOR COMPLET
function downloadTCX(){
  var sport=isCycling?'Biking':isSwim?'Other':'Running';
  var stepId=1;
  var stepsXML='';
  var s=struct||[{title:title,sub:sub,dur:duracio,color:'#4EA84A'}];

  s.forEach(function(b){
    var series=parseSeries(b.title,b.sub);
    var zIdx=colorToZone[b.color]!==undefined?colorToZone[b.color]:mainZone;
    if(zIdx<0) zIdx=0;
    var z=zones[Math.min(zIdx,4)];

    if(series&&series.reps>1){
      var activeId=stepId+1;
      var restId=stepId+2;
      stepsXML+='<Step xsi:type="Repeat_t">';
      stepsXML+='<StepId>'+stepId+'</StepId>';
      stepsXML+='<Repetitions>'+series.reps+'</Repetitions>';
      // Active step
      stepsXML+='<Child xsi:type="Step_t">';
      stepsXML+='<StepId>'+activeId+'</StepId>';
      stepsXML+='<Name>'+esc(b.title)+'</Name>';
      if(series.distMeters){
        stepsXML+='<Duration xsi:type="Distance_t"><Meters>'+series.distMeters+'</Meters></Duration>';
      } else if(series.timeSecs){
        stepsXML+='<Duration xsi:type="Time_t"><Seconds>'+series.timeSecs+'</Seconds></Duration>';
      } else {
        stepsXML+='<Duration xsi:type="UserInitiated_t"/>';
      }
      stepsXML+='<Intensity>Active</Intensity>';
      stepsXML+='<Target xsi:type="HeartRate_t"><HeartRateZone xsi:type="CustomHeartRateZone_t"><Low>'+z.min+'</Low><High>'+z.max+'</High></HeartRateZone></Target>';
      stepsXML+='</Child>';
      // Rest step
      stepsXML+='<Child xsi:type="Step_t">';
      stepsXML+='<StepId>'+restId+'</StepId>';
      stepsXML+='<Name>Descanso</Name>';
      stepsXML+='<Duration xsi:type="Time_t"><Seconds>'+series.restSecs+'</Seconds></Duration>';
      stepsXML+='<Intensity>Rest</Intensity>';
      stepsXML+='<Target xsi:type="Open_t"/>';
      stepsXML+='</Child>';
      stepsXML+='</Step>';
      stepId+=3;
    } else {
      stepsXML+='<Step xsi:type="Step_t">';
      stepsXML+='<StepId>'+stepId+'</StepId>';
      stepsXML+='<Name>'+esc(b.title)+'</Name>';
      stepsXML+='<Duration xsi:type="Time_t"><Seconds>'+(b.dur*60)+'</Seconds></Duration>';
      if(zIdx>=0){
        stepsXML+='<Intensity>Active</Intensity>';
        stepsXML+='<Target xsi:type="HeartRate_t"><HeartRateZone xsi:type="CustomHeartRateZone_t"><Low>'+z.min+'</Low><High>'+z.max+'</High></HeartRateZone></Target>';
      } else {
        stepsXML+='<Intensity>Rest</Intensity><Target xsi:type="Open_t"/>';
      }
      stepsXML+='</Step>';
      stepId++;
    }
  });

  var xml='<?xml version="1.0" encoding="UTF-8"?>';
  xml+='<TrainingCenterDatabase xsi:schemaLocation="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2 http://www.garmin.com/xmlschemas/TrainingCenterDatabasev2.xsd" xmlns="http://www.garmin.com/xmlschemas/TrainingCenterDatabase/v2" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">';
  xml+='<Workouts><Workout Sport="'+sport+'">';
  xml+='<Name>'+esc(title)+'</Name>';
  xml+=stepsXML;
  xml+='<ScheduledOn>'+new Date().toISOString().split('T')[0]+'</ScheduledOn>';
  xml+='</Workout></Workouts></TrainingCenterDatabase>';

  var a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([xml],{type:'application/xml'}));
  a.download=title.replace(/\s+/g,'_')+'.tcx';
  a.click();
}

// GYM PDF
function downloadGymPDF(){
  var ex=exList||getGym();
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+esc(title)+'</title>';
  html+='<style>body{font-family:Arial,sans-serif;padding:20px;max-width:600px;margin:0 auto}';
  html+='h1{color:#163A28;border-bottom:2px solid #163A28;padding-bottom:8px}';
  html+='.ex{margin:16px 0;padding:12px;border:1px solid #ddd;border-radius:8px}';
  html+='.ex-num{display:inline-block;background:#163A28;color:#fff;width:28px;height:28px;border-radius:50%;text-align:center;line-height:28px;font-size:13px;margin-right:10px}';
  html+='.ex-name{font-size:16px;font-weight:bold;color:#111}';
  html+='.ex-detail{color:#555;margin-top:4px;font-size:14px}';
  html+='.ex-muscle{background:#EBF5EF;color:#163A28;padding:2px 8px;border-radius:20px;font-size:12px;margin-top:6px;display:inline-block}';
  html+='@media print{body{padding:0}}</style></head><body>';
  html+='<h1>'+esc(title)+'</h1>';
  html+='<p style="color:#888;margin-bottom:20px">'+esc(sub)+'</p>';
  ex.forEach(function(e,i){
    html+='<div class="ex">';
    html+='<span class="ex-num">'+(i+1)+'</span><span class="ex-name">'+esc(e.name)+'</span>';
    html+='<div class="ex-detail">'+esc(e.detail)+'</div>';
    html+='<div class="ex-muscle">'+esc(e.muscle)+'</div>';
    html+='</div>';
  });
  html+='<p style="margin-top:30px;color:#888;font-size:12px">traineo.app · '+new Date().toLocaleDateString()+'</p>';
  html+='</body></html>';
  var w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){w.print();},500);
}

// MODE GUIAT
var steps=[];
var cur=0;
var timer=null;
var timeLeft=0;

function buildSteps(){
  steps=[];
  if(struct){
    steps.push({type:'intro',title:'¡Vamos!',sub:'Sesión lista · sigue los pasos',dur:0,color:'#163A28'});
    struct.forEach(function(b){
      var series=parseSeries(b.title,b.sub);
      var zIdx=colorToZone[b.color]!==undefined?colorToZone[b.color]:mainZone;
      if(zIdx<0) zIdx=0;
      if(series&&series.reps>1){
        for(var i=1;i<=series.reps;i++){
          steps.push({type:'serie',num:i,total:series.reps,distMeters:series.distMeters,timeSecs:series.timeSecs,zoneIdx:Math.min(zIdx,4),blockTitle:b.title,color:b.color});
          if(i<series.reps){
            steps.push({type:'descanso',num:i,total:series.reps,dur:series.restSecs,color:'#888780'});
          }
        }
      } else {
        steps.push({type:'cardio',color:b.color,zoneIdx:Math.min(zIdx<0?0:zIdx,4),...b});
      }
    });
    steps.push({type:'outro',title:'¡Sesión completada!',sub:'Estira bien · hidratate · descansa',dur:0,color:'#4A9E6B'});
  } else if(exList){
    steps.push({type:'intro',title:'¡A por ello!',sub:'Prepara el espacio · calienta 5 min',dur:0,color:'#163A28'});
    exList.forEach(function(e,i){steps.push({type:'exercise',num:i+1,...e});});
    steps.push({type:'outro',title:'¡Sesión completada!',sub:'Estira bien y descansa',dur:0,color:'#4A9E6B'});
  } else {
    steps.push({type:'cardio',title:title,sub:sub,dur:duracio,color:'#4EA84A',zoneIdx:mainZone});
  }
}

function startGuided(){buildSteps();cur=0;document.getElementById('guided').classList.add('open');renderStep();}
function closeGuided(){clearInterval(timer);document.getElementById('guided').classList.remove('open');}

function renderStep(){
  clearInterval(timer);
  var s=steps[cur];
  var isLast=cur===steps.length-1;
  var isFirst=cur===0;
  var total=steps.length;

  // Dots
  var dotsHTML='';
  steps.forEach(function(_,i){
    var cls='gdot';
    if(i<cur) cls+=' done';
    else if(i===cur) cls+=' active';
    else if(steps[i]&&steps[i].type==='descanso') cls+=' rest';
    dotsHTML+='<div class="'+cls+'"></div>';
  });
  document.getElementById('g-dots').innerHTML=dotsHTML;
  document.getElementById('g-step-info').textContent='Paso '+(cur+1)+' de '+total;
  document.getElementById('g-prev').style.display=isFirst?'none':'block';

  var bodyHTML='';
  document.getElementById('g-progress').style.width='0%';

  if(s.type==='serie'){
    var z=zones[s.zoneIdx];
    var distLabel=s.distMeters?(s.distMeters+'m'):(s.timeSecs?fmt(s.timeSecs):'');
    document.getElementById('g-next').textContent='Completada ✓';
    bodyHTML='<div class="guided-type">Serie '+s.num+' de '+s.total+'</div>';
    bodyHTML+='<div class="guided-serie-counter">'+distLabel+'</div>';
    bodyHTML+='<div class="guided-zone-badge">'+z.label+' · '+z.min+'-'+z.max+' bpm</div>';
    bodyHTML+='<div class="guided-detail">'+esc(s.blockTitle||'')+'</div>';
    bodyHTML+='<div style="font-size:.8rem;color:rgba(255,255,255,.3);margin-top:.25rem">El GPS contará los metros</div>';

  } else if(s.type==='descanso'){
    document.getElementById('g-next').textContent='Listo →';
    timeLeft=s.dur||60;
    var total2=timeLeft;
    bodyHTML='<div class="guided-type">Descanso '+s.num+' / '+(s.total-1)+'</div>';
    bodyHTML+='<div class="guided-name">Recupera</div>';
    bodyHTML+='<div class="guided-timer" id="g-timer">'+fmt(timeLeft)+'</div>';
    bodyHTML+='<div class="guided-timer-lbl">segundos · pulsa Listo cuando estés preparado</div>';
    setTimeout(function(){
      timer=setInterval(function(){
        timeLeft--;
        var el=document.getElementById('g-timer');
        if(el) el.textContent=fmt(timeLeft);
        document.getElementById('g-progress').style.width=((total2-timeLeft)/total2*100)+'%';
        if(timeLeft<=0){clearInterval(timer);}
      },1000);
    },100);

  } else if(s.type==='exercise'){
    document.getElementById('g-next').textContent='Hecho ✓';
    bodyHTML='<div class="guided-type">Ejercicio '+s.num+' de '+exList.length+'</div>';
    bodyHTML+='<div class="guided-ex-num">'+String(s.num).padStart(2,'0')+'</div>';
    bodyHTML+='<div class="guided-name">'+esc(s.name)+'</div>';
    bodyHTML+='<div class="guided-detail">'+esc(s.detail)+'</div>';
    bodyHTML+='<div class="guided-muscle">'+esc(s.muscle)+'</div>';

  } else if(s.type==='intro'||s.type==='outro'){
    document.getElementById('g-next').textContent=s.type==='outro'?'¡Cerrar! 🎉':'Empezar →';
    bodyHTML='<div class="guided-name">'+esc(s.title)+'</div>';
    bodyHTML+='<div class="guided-detail">'+esc(s.sub||'')+'</div>';

  } else {
    // cardio amb timer
    document.getElementById('g-next').textContent=isLast?'¡Completado! 🎉':'Siguiente →';
    var z2=zones[s.zoneIdx||mainZone];
    timeLeft=(s.dur||1)*60;
    var total3=timeLeft;
    bodyHTML='<div class="guided-type">Bloque</div>';
    bodyHTML+='<div class="guided-name">'+esc(s.title)+'</div>';
    bodyHTML+='<div class="guided-zone-badge">'+z2.label+' · '+z2.min+'-'+z2.max+' bpm</div>';
    bodyHTML+='<div class="guided-timer" id="g-timer">'+fmt(timeLeft)+'</div>';
    bodyHTML+='<div class="guided-timer-lbl">minutos restantes</div>';
    setTimeout(function(){
      timer=setInterval(function(){
        timeLeft--;
        var el=document.getElementById('g-timer');
        if(el) el.textContent=fmt(timeLeft);
        document.getElementById('g-progress').style.width=((total3-timeLeft)/total3*100)+'%';
        if(timeLeft<=0){clearInterval(timer);if(!isLast) nextStep();}
      },1000);
    },100);
  }

  document.getElementById('g-body').innerHTML=bodyHTML;
}

function nextStep(){if(cur<steps.length-1){cur++;renderStep();}else closeGuided();}
function prevStep(){if(cur>0){cur--;renderStep();}}
function fmt(s){var m=Math.floor(s/60);var ss=s%60;return m+':'+(ss<10?'0':'')+ss;}
</script>
